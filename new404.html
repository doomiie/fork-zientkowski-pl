<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>404 | Ups, ta strona zniknęła</title>
  <style>
    @font-face {
      font-family: "Space Grotesk";
      src: url("assets/fonts/SpaceGrotesk-PL.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0e1118;
      --glass: rgba(9, 14, 24, 0.64);
      --glass-border: rgba(255, 255, 255, 0.24);
      --text: #f5f7ff;
      --muted: #ced5e8;
      --accent: #ff9b47;
      --accent-strong: #ff7f1f;
      --ring: #ffd2ad;
      --shadow: 0 24px 56px rgba(0, 0, 0, 0.46);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(112deg, rgba(4, 6, 12, 0.86), rgba(22, 12, 4, 0.62)),
        radial-gradient(circle at 84% 18%, rgba(255, 167, 88, 0.22) 0%, transparent 48%),
        url("assets/img/IMG_0582.jpg");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      filter: blur(24px);
    }

    body::before {
      width: min(40vw, 300px);
      height: min(40vw, 300px);
      background: rgba(255, 161, 91, 0.28);
      left: 6vw;
      top: 8vh;
      animation: floatA 11s ease-in-out infinite;
    }

    body::after {
      width: min(48vw, 360px);
      height: min(48vw, 360px);
      background: rgba(59, 114, 188, 0.18);
      right: 7vw;
      bottom: 8vh;
      animation: floatB 13s ease-in-out infinite;
    }

    main {
      width: min(92vw, 760px);
      position: relative;
      z-index: 1;
    }

    .panel {
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: clamp(1.4rem, 2.3vw + 1rem, 2.6rem);
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transform: translateY(0);
      animation: appear 560ms cubic-bezier(.22, .61, .36, 1);
    }

    .badge {
      display: inline-block;
      margin-bottom: 0.9rem;
      padding: 0.32rem 0.66rem;
      border-radius: 999px;
      color: #2e1a0b;
      background: linear-gradient(90deg, #ffd2ab, #ffb774);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      line-height: 0.95;
      font-size: clamp(2.2rem, 8vw, 5.4rem);
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .lead {
      margin: 0.9rem 0 1.25rem;
      font-size: clamp(1rem, 1.2vw + 0.82rem, 1.3rem);
      color: var(--muted);
      max-width: 58ch;
      text-wrap: pretty;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.72rem;
      margin-top: 1.2rem;
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.76rem 1.15rem;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 190ms ease, box-shadow 190ms ease, border-color 190ms ease, background-color 190ms ease;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .btn.primary {
      color: #1f0f03;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      border-color: rgba(255, 199, 152, 0.62);
      box-shadow: 0 10px 26px rgba(255, 143, 41, 0.32);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.24);
    }

    .btn:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    .small {
      margin-top: 1rem;
      font-size: 0.84rem;
      color: #d7deef;
      opacity: 0.92;
    }

    .small a {
      color: #ffe3c6;
      text-underline-offset: 2px;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatA {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10px, -10px); }
    }

    @keyframes floatB {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-12px, 10px); }
    }

    @media (max-width: 640px) {
      .panel {
        border-radius: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="error-title">
      <span class="badge">Error 404</span>
      <h1 id="error-title">Ta strona wyparowała</h1>
      <p class="lead">
        Link prowadzi w miejsce, którego już nie ma lub adres został wpisany niepoprawnie.
        Wróć na stronę główną albo skontaktuj się z nami, a pomożemy trafić tam, gdzie trzeba.
      </p>

      <nav class="actions" aria-label="Nawigacja po błędzie 404">
        <a class="btn primary" href="/">Wróć na stronę główną</a>
        <button class="btn" type="button" onclick="history.length > 1 ? history.back() : location.href='/'">Cofnij</button>
        <a class="btn" href="/kontakt.html">Kontakt</a>
      </nav>

      <p class="small">
        Jeśli błąd się powtarza, napisz na <a href="mailto:kontakt@zientkowski.pl">kontakt@zientkowski.pl</a>.
      </p>
    </section>
  </main>
</body>
</html>
