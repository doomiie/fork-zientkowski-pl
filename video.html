<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video | Jerzy Zientkowski</title>
  <link rel="preload" as="style" href="/assets/css/app.min.css?v=brand12" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="/assets/css/shared.css?v=dev18" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="stylesheet" href="/assets/css/app.min.css?v=brand12">
  <link rel="stylesheet" href="/assets/css/shared.css?v=dev19">
  <noscript><link rel="stylesheet" href="/assets/css/app.min.css?v=brand12"></noscript>
  <noscript><link rel="stylesheet" href="/assets/css/shared.css?v=dev18"></noscript>
  <link rel="stylesheet" href="/assets/css/video.css?v=20260316-1">
</head>
<body class="bg-light min-h-screen">
  <a class="skip-link" href="#main-content">Przejdź do treści głównej</a>

  <header id="siteHeader" class="video-header fixed top-0 left-0 right-0 z-50 bg-white">
    <div class="video-container video-header__inner">
      <a href="/" class="video-brand" aria-label="Strona główna">
        <img id="siteHeaderLogo" class="brightness-0" src="/assets/img/logo_main.png" alt="Logo Jerzy Zientkowski">
      </a>
      <div class="video-header__menu-slot">
        <nav id="navDesktop" class="hidden md:flex items-center justify-end w-full text-dark">
          <div id="video-menu-controls-desktop" class="video-menu-controls" aria-live="polite"></div>
        </nav>
        <div class="flex items-center md:hidden">
          <button id="menuToggleHome" aria-label="Menu" class="video-menu-toggle" aria-controls="mobileMenuHome" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>
  <div id="mobileMenuOverlayHome" class="fixed inset-0 bg-black/50 z-[1000] hidden"></div>
  <aside id="mobileMenuHome" class="fixed inset-y-0 right-0 w-4/5 max-w-sm bg-white z-[1001] shadow-xl transform translate-x-full transition-transform">
    <div class="p-4 flex items-center justify-between border-b border-gray-200">
      <span class="font-semibold text-dark">Menu</span>
      <button id="menuCloseHome" aria-label="Zamknij menu" class="p-2 rounded-lg text-gray-600 hover:bg-gray-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <nav id="navMobile" class="p-4 space-y-3">
      <div id="video-menu-controls-mobile" class="video-mobile-controls" aria-live="polite"></div>
    </nav>
  </aside>

  <main id="main-content" class="video-main">
    <div class="video-container">
      <section class="video-screen" aria-labelledby="video-title">
        <div class="video-screen__player" aria-label="Odtwarzacz wideo">
          <h1 id="video-title" class="video-screen__title">Wideo</h1>
          <p id="video-status" class="video-screen__status" role="status" aria-live="polite">Ładowanie...</p>
          <p id="video-token-info" class="video-screen__status" role="status" aria-live="polite"></p>
          <p id="video-access-message" class="video-screen__status" role="status" aria-live="polite" hidden>
            Zaloguj się lub użyj poprawnego tokenu, aby zobaczyć listę filmów.
          </p>
          <div id="video-player-wrap" class="video-player-wrap" hidden>
            <div id="yt-player" aria-label="Odtwarzacz YouTube"></div>
            <video id="drive-player" aria-label="Odtwarzacz Google Drive" controls playsinline preload="metadata" hidden></video>
            <iframe id="drive-preview" title="Podgląd Google Drive" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allow="autoplay; fullscreen" hidden></iframe>
          </div>
          <a id="drive-open-external" class="video-button video-button--ghost" href="#" target="_blank" rel="noopener noreferrer" hidden>Otwórz w Google Drive</a>
          <button id="add-comment-btn" class="video-button video-button--primary" type="button" aria-label="Dodaj komentarz" hidden>
            Dodaj komentarz
          </button>
        </div>

        <aside id="video-comments-section" class="video-screen__comments" aria-labelledby="comments-heading" hidden>
          <h2 id="comments-heading" class="video-screen__subtitle">Komentarze</h2>
          <p id="comments-empty" class="video-screen__empty" hidden>Brak komentarzy dla tego filmu.</p>
          <ul id="comments-list" class="video-comments" aria-label="Lista komentarzy"></ul>
        </aside>
      </section>

    </div>
  </main>

  <div id="comment-modal" class="comment-modal" role="dialog" aria-modal="true" aria-labelledby="form-heading" hidden>
    <div id="comment-modal-overlay" class="comment-modal__overlay"></div>
    <section id="comment-modal-panel" class="comment-modal__panel" role="document">
      <button id="comment-modal-close-btn" type="button" class="comment-modal__close" aria-label="Zamknij formularz komentarza">×</button>
      <section id="comment-form-section" class="video-form-section comment-modal__body" aria-labelledby="form-heading">
        <h2 id="form-heading" class="video-screen__subtitle">Dodaj komentarz</h2>
        <form id="comment-form" class="video-form" novalidate>
          <div id="comment-meta-readonly" class="video-form__meta" hidden>
            <p class="video-form__meta-row"><span>Czas:</span> <strong id="comment-meta-time">00:00</strong></p>
            <p class="video-form__meta-row"><span>Autor:</span> <strong id="comment-meta-author">-</strong></p>
          </div>

          <div id="comment-time-fields" class="video-form__grid">
            <label class="video-form__field">
              <span>Czas (sekundy)</span>
              <input id="comment-time" name="czas_sekundy" type="number" min="0" max="86400" required>
            </label>
            <label class="video-form__field">
              <span>Czas (tekst)</span>
              <input id="comment-time-text" name="czas_tekst" type="text" placeholder="mm:ss lub h:mm:ss">
            </label>
          </div>

          <label id="comment-title-field" class="video-form__field">
            <span>Tytuł komentarza</span>
            <input id="comment-title" name="tytul" type="text" maxlength="160">
          </label>

          <label class="video-form__field">
            <span class="video-form__field-head">
              <span>Treść komentarza</span>
              <button
                id="comment-transcribe-btn"
                class="video-mic-btn"
                type="button"
                aria-label="Dyktuj treść komentarza"
                title="Dyktowanie głosowe"
              >🎤</button>
            </span>
            <textarea id="comment-content" name="tresc" rows="4" maxlength="2000"></textarea>
            <span id="comment-transcribe-status" class="video-transcribe-status" role="status" aria-live="polite"></span>
          </label>

          <div id="comment-meta-fields" class="video-form__grid">
            <label class="video-form__field">
              <span>Wariant</span>
              <input id="comment-variant" name="wariant" type="text" maxlength="64" value="ogolny">
            </label>
            <label class="video-form__field">
              <span>Autor</span>
              <input id="comment-author" name="autor" type="text" maxlength="80">
            </label>
          </div>

          <div class="video-form__actions">
            <button type="submit" class="video-button video-button--primary">Zapisz komentarz</button>
            <button type="button" id="cancel-comment-btn" class="video-button video-button--ghost">Anuluj</button>
          </div>
          <input id="comment-id" name="comment_id" type="hidden">
          <p id="form-status" class="video-form__status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </section>
  </div>

  <div id="video-auth-modal" class="video-auth-modal" role="dialog" aria-modal="true" aria-labelledby="video-auth-heading" hidden>
    <div id="video-auth-modal-overlay" class="video-auth-modal__overlay"></div>
    <section class="video-auth-modal__panel" role="document">
      <button id="video-auth-close-btn" type="button" class="video-auth-modal__close" aria-label="Zamknij logowanie">×</button>
      <section id="video-auth-section" class="video-auth" aria-labelledby="video-auth-heading">
        <h2 id="video-auth-heading" class="video-source__title">Logowanie użytkownika</h2>
        <p id="video-auth-user" class="video-auth__user" role="status" aria-live="polite"></p>
        <form id="video-auth-form" class="video-auth__form" novalidate>
          <input id="video-auth-csrf" name="csrf_token" type="hidden">
          <label class="video-source__field" for="video-auth-email">
            <span>E-mail</span>
            <input id="video-auth-email" name="email" type="email" autocomplete="username">
          </label>
          <label class="video-source__field" for="video-auth-password">
            <span>Hasło</span>
            <input id="video-auth-password" name="password" type="password" autocomplete="current-password">
          </label>
          <div class="video-form__actions">
            <button type="submit" class="video-button video-button--primary">Zaloguj</button>
            <button id="video-auth-logout-btn" type="button" class="video-button video-button--ghost" hidden>Wyloguj</button>
          </div>
        </form>
        <p id="video-auth-status" class="video-source__status" role="status" aria-live="polite"></p>
      </section>
    </section>
  </div>


  <div id="video-add-modal" class="video-add-modal" role="dialog" aria-modal="true" aria-labelledby="video-add-heading" hidden>
    <div id="video-add-modal-overlay" class="video-add-modal__overlay"></div>
    <section class="video-add-modal__panel" role="document">
      <button id="video-add-close-btn" type="button" class="video-add-modal__close" aria-label="Zamknij dodawanie filmu">×</button>
      <section id="video-add-section" class="video-source" aria-labelledby="video-add-heading">
        <h2 id="video-add-heading" class="video-source__title">Dodaj video (trener/admin)</h2>
        <form id="video-add-form" class="video-source__form" novalidate>
          <label class="video-source__field" for="video-add-input">
            <span>Pełny link YouTube/Google Drive lub ID</span>
            <input id="video-add-input" name="youtube_url" type="text" placeholder="https://www.youtube.com/watch?v=... lub https://drive.google.com/file/d/.../view" required>
          </label>
          <button type="submit" class="video-button video-button--primary video-source__submit">Dodaj do bazy</button>
        </form>
        <p id="video-add-status" class="video-source__status" role="status" aria-live="polite"></p>
      </section>
    </section>
  </div>
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="/assets/js/video.js?v=20260316-9" defer></script>
</body>
</html>
